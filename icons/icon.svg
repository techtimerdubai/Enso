<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#20222b"/><stop offset="1" stop-color="#0f1014"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- ensō: a single tapering brush ring, drawn as a stroke with a gap -->
  <path d="M300 150
           a120 120 0 1 0 78 96"
        fill="none" stroke="#e0503a" stroke-width="34" stroke-linecap="round"
        transform="rotate(18 256 256)"/>
  <!-- brush tail thinning -->
  <path d="M356 220 q26 24 20 60" fill="none" stroke="#e0503a" stroke-width="16" stroke-linecap="round"/>
</svg>
